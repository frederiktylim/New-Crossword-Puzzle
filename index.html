<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crossword Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
header{text-align:center;padding:24px 16px 8px;width:100%}
header h1{font-size:2rem;font-weight:700;color:#e0e0e0;letter-spacing:2px;margin-bottom:8px}
#buildBtn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:14px 40px;font-size:1.1rem;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:1px}
#buildBtn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(102,126,234,.4)}
#buildBtn:active{transform:translateY(0)}
#buildBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
#loading{display:none;margin:12px 0;color:#667eea;font-size:.95rem}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(102,126,234,.3);border-top-color:#667eea;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
#gameArea{display:none;width:100%;max-width:1200px;padding:16px;gap:20px}
#gameArea.active{display:flex;flex-wrap:wrap;justify-content:center}
#gridSection{flex:0 0 auto}
#gridContainer{position:relative;display:inline-block;border:3px solid #333;background:#111;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.cell{position:absolute;border:1px solid #333;background:#f8f8f0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#222;transition:background .1s;user-select:none}
.cell.black{background:#111;cursor:default;border-color:#222}
.cell.selected{background:#667eea!important;color:#fff!important}
.cell.highlighted{background:#c5cef7}
.cell.correct{background:#c8f7c5}
.cell.incorrect{background:#f7c5c5}
.cell .number{position:absolute;top:1px;left:2px;font-size:9px;font-weight:600;color:#555;line-height:1;pointer-events:none}
.cell.selected .number,.cell.highlighted .number{color:inherit}
.cell .letter{font-size:inherit;text-transform:uppercase;pointer-events:none}
#cluesSection{flex:1;min-width:280px;max-width:400px;max-height:580px;overflow-y:auto;padding:0 8px}
#cluesSection h3{font-size:1.1rem;color:#667eea;margin:0 0 8px;padding-bottom:4px;border-bottom:2px solid #333;text-transform:uppercase;letter-spacing:1px}
.clue-group{margin-bottom:20px}
.clue{padding:4px 8px;font-size:.88rem;cursor:pointer;border-radius:4px;line-height:1.4;transition:background .15s;color:#ccc}
.clue:hover{background:rgba(102,126,234,.15)}
.clue.active{background:rgba(102,126,234,.25);color:#fff}
.clue-num{font-weight:700;color:#667eea;margin-right:4px}
#controls{display:none;padding:12px;gap:10px;flex-wrap:wrap;justify-content:center}
#controls.active{display:flex}
#controls button{background:#2a2a4a;color:#ccc;border:1px solid #444;padding:8px 20px;font-size:.9rem;border-radius:6px;cursor:pointer;transition:all .15s}
#controls button:hover{background:#3a3a5a;color:#fff;border-color:#667eea}
#timer{font-size:.95rem;color:#888;padding:8px 16px;font-variant-numeric:tabular-nums}
#message{text-align:center;padding:8px;color:#667eea;font-weight:600;min-height:24px;font-size:.95rem}
@media(max-width:800px){
  #gameArea.active{flex-direction:column;align-items:center}
  #cluesSection{max-height:300px;max-width:100%}
  .cell{font-size:16px!important}
}
</style>
</head>
<body>
<header>
  <h1>CROSSWORD</h1>
  <button id="buildBtn">Build Game</button>
  <div id="loading"><span class="spinner"></span>Generating puzzle...</div>
</header>
<div id="message"></div>
<div id="gameArea">
  <div id="gridSection">
    <div id="gridContainer"></div>
  </div>
  <div id="cluesSection">
    <div class="clue-group"><h3>Across</h3><div id="acrossClues"></div></div>
    <div class="clue-group"><h3>Down</h3><div id="downClues"></div></div>
  </div>
</div>
<div id="controls">
  <div id="timer">0:00</div>
  <button id="checkBtn">Check</button>
  <button id="revealBtn">Reveal</button>
  <button id="clearBtn">Clear</button>
</div>

// ===== BUILD INDICES =====
const wordsByLength = {};
const wordClueMap = {};

for (const [w, c] of WORD_DATA) {
  const word = w.toUpperCase();
  const len = word.length;
  if (!wordsByLength[len]) wordsByLength[len] = [];
  wordsByLength[len].push(word);
  wordClueMap[word] = c;
}

// Track which words have real clues (from WORD_DATA)
const hasRealClue = new Set();
for (const [w] of WORD_DATA) hasRealClue.add(w.toUpperCase());

// Add extended word list for filling
for (const w of FILL_WORDS) {
  const word = w.toUpperCase();
  const len = word.length;
  if (!wordsByLength[len]) wordsByLength[len] = [];
  if (!wordClueMap[word]) {
    wordsByLength[len].push(word);
    // Generate a descriptive fallback clue
    const wLower = word.charAt(0) + word.slice(1).toLowerCase();
    wordClueMap[word] = wLower + ' (crossword fill)';
  }
}

// Remove duplicates
for (const len in wordsByLength) {
  wordsByLength[len] = [...new Set(wordsByLength[len])];
}

// Build letter index: key = `${len}_${pos}_${letter}` -> Set of words
const letterIndex = {};
for (const len in wordsByLength) {
  for (const word of wordsByLength[len]) {
    for (let i = 0; i < word.length; i++) {
      const key = `${len}_${i}_${word[i]}`;
      if (!letterIndex[key]) letterIndex[key] = new Set();
      letterIndex[key].add(word);
    }
  }
}

// ===== GRID PATTERN GENERATOR =====
const SIZE = 15;

function isValidPattern(grid) {
  // Check row words
  for (let r = 0; r < SIZE; r++) {
    let run = 0;
    for (let c = 0; c <= SIZE; c++) {
      if (c < SIZE && !grid[r][c]) { run++; }
      else { if (run > 0 && run < 3) return false; run = 0; }
    }
  }
  // Check column words
  for (let c = 0; c < SIZE; c++) {
    let run = 0;
    for (let r = 0; r <= SIZE; r++) {
      if (r < SIZE && !grid[r][c]) { run++; }
      else { if (run > 0 && run < 3) return false; run = 0; }
    }
  }
  // Check connectivity via BFS
  let sr = -1, sc = -1;
  for (let r = 0; r < SIZE && sr < 0; r++)
    for (let c = 0; c < SIZE && sr < 0; c++)
      if (!grid[r][c]) { sr = r; sc = c; }
  if (sr < 0) return false;
  const visited = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
  const queue = [[sr, sc]];
  visited[sr][sc] = true;
  let count = 1;
  while (queue.length > 0) {
    const [r, c] = queue.shift();
    for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && !grid[nr][nc] && !visited[nr][nc]) {
        visited[nr][nc] = true;
        count++;
        queue.push([nr, nc]);
      }
    }
  }
  let totalWhite = 0;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!grid[r][c]) totalWhite++;
  return count === totalWhite;
}

  "100010001100000100010001100000100000001000000000100000010001000100000010000000011000100000100010000001000111000111000111000100000010001000001000110000000010000001000100010000001000000000100000001000001100010001000001100010001",
  "000100011100000000000010000000000000010000000000011000010001000100001100000100000100001000111000010001000111000010000111000100010000111000100001000001000001100001000100010000110000000000010000000000000010000000000001110001000",
  "000100010001000000100010001000000000010000000000001000100001000000100000111000110000011000111000011000000000000010000000000000110000111000110000011000111000001000000100001000100000000000010000000000100010001000000100010001000",
  "000100010001000000000010000000000000010000000000011000110001000111000111000100010000001000100010001000000111000111000111000000100010001000100000010001000111000111000100011000110000000000010000000000000010000000000100010001000"
];

function parsePattern(str) {
  const grid = [];
  for (let r = 0; r < SIZE; r++) {
    grid.push([]);
    for (let c = 0; c < SIZE; c++) {
      grid[r].push(str[r * SIZE + c] === '1');
    }
  }
  return grid;
}

function maxWordLength(grid) {
  let mx = 0;
  for (let r = 0; r < SIZE; r++) {
    let run = 0;
    for (let c = 0; c <= SIZE; c++) {
      if (c < SIZE && !grid[r][c]) run++; else { mx = Math.max(mx, run); run = 0; }
    }
  }
  for (let c = 0; c < SIZE; c++) {
    let run = 0;
    for (let r = 0; r <= SIZE; r++) {
      if (r < SIZE && !grid[r][c]) run++; else { mx = Math.max(mx, run); run = 0; }
    }
  }
  return mx;
}

function isViablePattern(grid) {
  if (!isValidPattern(grid)) return false;
  const slots = extractSlots(grid);
  for (const slot of slots) {
    const words = wordsByLength[slot.length];
    if (!words || words.length < 5) return false;
  }
  // Keep max word length to 7 for reliable filling
  if (maxWordLength(grid) > 7) return false;
  return true;
}

function generatePattern() {
  // Try pre-defined patterns (shuffled) — filter for viability
  const indices = shuffle([...Array(PATTERN_STRINGS.length).keys()]);
  for (const i of indices) {
    const grid = parsePattern(PATTERN_STRINGS[i]);
    if (isViablePattern(grid)) return grid;
  }

  // Generate random patterns with enough blacks to keep max word ≤ 7
  for (let attempt = 0; attempt < 200; attempt++) {
    const grid = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
    const targetBlacks = 42 + Math.floor(Math.random() * 10); // 42-51
    let placed = 0;
    let tries = 0;
    while (placed < targetBlacks && tries < 5000) {
      tries++;
      const r = Math.floor(Math.random() * SIZE);
      const c = Math.floor(Math.random() * SIZE);
      if (grid[r][c]) continue;
      const sr = SIZE - 1 - r, sc = SIZE - 1 - c;
      if (grid[sr][sc]) continue;
      grid[r][c] = true;
      grid[sr][sc] = true;
      const addedCount = (r === sr && c === sc) ? 1 : 2;
      if (isValidPattern(grid)) {
        placed += addedCount;
      } else {
        grid[r][c] = false;
        grid[sr][sc] = false;
      }
    }
    if (placed >= 40 && isViablePattern(grid)) return grid;
  }
  return null;
}

// ===== SLOT EXTRACTION =====
function extractSlots(grid) {
  const slots = [];
  // Across
  for (let r = 0; r < SIZE; r++) {
    let start = -1;
    for (let c = 0; c <= SIZE; c++) {
      if (c < SIZE && !grid[r][c]) {
        if (start < 0) start = c;
      } else {
        if (start >= 0 && c - start >= 3) {
          slots.push({ row: r, col: start, length: c - start, dir: 'across', cells: [] });
          const slot = slots[slots.length - 1];
          for (let i = 0; i < slot.length; i++) slot.cells.push([r, start + i]);
        }
        start = -1;
      }
    }
  }
  // Down
  for (let c = 0; c < SIZE; c++) {
    let start = -1;
    for (let r = 0; r <= SIZE; r++) {
      if (r < SIZE && !grid[r][c]) {
        if (start < 0) start = r;
      } else {
        if (start >= 0 && r - start >= 3) {
          slots.push({ row: start, col: c, length: r - start, dir: 'down', cells: [] });
          const slot = slots[slots.length - 1];
          for (let i = 0; i < slot.length; i++) slot.cells.push([start + i, c]);
        }
        start = -1;
      }
    }
  }
  return slots;
}

// ===== CROSSWORD FILLER =====
function getCandidates(slot, letters, usedWords) {
  const len = slot.length;
  let result = null;
  for (let i = 0; i < len; i++) {
    const [r, c] = slot.cells[i];
    const letter = letters[r][c];
    if (letter) {
      const key = `${len}_${i}_${letter}`;
      const set = letterIndex[key];
      if (!set || set.size === 0) return [];
      if (!result) result = new Set(set);
      else {
        const newResult = new Set();
        for (const w of result) if (set.has(w)) newResult.add(w);
        result = newResult;
      }
      if (result.size === 0) return [];
    }
  }
  if (!result) result = new Set(wordsByLength[len] || []);
  for (const w of usedWords) result.delete(w);
  return [...result];
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function fillGrid(grid) {
  const slots = extractSlots(grid);
  const N = slots.length;

  // Build crossing map: for each cell, which slot indices use it
  const cellToSlots = {};
  for (let si = 0; si < N; si++) {
    for (const [r, c] of slots[si].cells) {
      const key = `${r}_${c}`;
      if (!cellToSlots[key]) cellToSlots[key] = [];
      cellToSlots[key].push(si);
    }
  }

  // For each slot, precompute crossing slot indices
  const crossingSlots = slots.map((slot, si) => {
    const crossers = new Set();
    for (const [r, c] of slot.cells) {
      for (const osi of cellToSlots[`${r}_${c}`]) {
        if (osi !== si) crossers.add(osi);
      }
    }
    return [...crossers];
  });

  const globalStart = Date.now();
  const TOTAL_TIME = 10000;

  // DFS backtracking with random restarts
  for (let restart = 0; restart < 200; restart++) {
    if (Date.now() - globalStart > TOTAL_TIME) break;
    const restartStart = Date.now();

    const letters = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
    const usedWords = new Set();
    const slotWords = new Array(N).fill(null);

    function solve() {
      if (Date.now() - restartStart > 500) return false; // 500ms per restart

      // Find most constrained unfilled slot
      let bestIdx = -1, bestCount = Infinity;
      for (let i = 0; i < N; i++) {
        if (slotWords[i]) continue;
        const cnt = getCandidates(slots[i], letters, usedWords).length;
        if (cnt === 0) return false;
        if (cnt < bestCount) { bestCount = cnt; bestIdx = i; }
        if (bestCount === 1) break; // can't do better
      }
      if (bestIdx === -1) return true; // all filled!

      const slot = slots[bestIdx];
      let candidates = getCandidates(slot, letters, usedWords);
      shuffle(candidates);
      // Boost curated words: move some to front but keep mix for fillability
      const curated = candidates.filter(w => hasRealClue.has(w)).slice(0, 6);
      const rest = candidates.filter(w => !curated.includes(w));
      candidates = curated.concat(rest);
      // Limit candidates to avoid exponential blowup
      if (candidates.length > 15) candidates = candidates.slice(0, 15);

      for (const word of candidates) {
        if (Date.now() - restartStart > 500) return false;

        // Place
        const saved = [];
        for (let i = 0; i < slot.length; i++) {
          const [r, c] = slot.cells[i];
          saved.push(letters[r][c]);
          letters[r][c] = word[i];
        }
        slotWords[bestIdx] = word;
        usedWords.add(word);

        // Quick forward check: do all crossing unfilled slots have candidates?
        let ok = true;
        for (const csi of crossingSlots[bestIdx]) {
          if (slotWords[csi]) continue;
          if (getCandidates(slots[csi], letters, usedWords).length === 0) {
            ok = false; break;
          }
        }

        if (ok && solve()) return true;

        // Undo
        for (let i = 0; i < slot.length; i++) {
          const [r, c] = slot.cells[i];
          letters[r][c] = saved[i];
        }
        slotWords[bestIdx] = null;
        usedWords.delete(word);
      }
      return false;
    }

    if (solve()) {
      return { letters, slots, slotWords: slotWords.slice() };
    }
  }
  return null;
}

// ===== NUMBER THE GRID =====
function numberGrid(grid, slots) {
  const numbers = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  // A cell gets a number if it starts an across or down word
  const startsWord = new Set();
  for (const slot of slots) {
    startsWord.add(`${slot.row}_${slot.col}`);
  }
  let num = 1;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c] && startsWord.has(`${r}_${c}`)) {
        numbers[r][c] = num++;
      }
    }
  }
  // Assign numbers to slots
  for (const slot of slots) {
    slot.number = numbers[slot.row][slot.col];
  }
  return numbers;
}

// ===== GAME ENGINE =====
let gameState = null;
let timerInterval = null;
let seconds = 0;

function buildGame() {
  const btn = document.getElementById('buildBtn');
  const loading = document.getElementById('loading');
  const msg = document.getElementById('message');
  btn.disabled = true;
  loading.style.display = 'block';
  msg.textContent = '';

  // Use setTimeout to let UI update
  setTimeout(() => {
    let result = null;
    for (let attempt = 0; attempt < 30; attempt++) {
      const grid = generatePattern();
      if (!grid) continue;
      result = fillGrid(grid);
      if (result) {
        result.grid = grid;
        break;
      }
    }

    loading.style.display = 'none';
    btn.disabled = false;

    if (!result) {
      msg.textContent = 'Generation failed. Please try again!';
      return;
    }

    const numbers = numberGrid(result.grid, result.slots);
    gameState = {
      grid: result.grid,
      solution: result.letters,
      slots: result.slots,
      numbers,
      userLetters: Array.from({length: SIZE}, () => Array(SIZE).fill('')),
      selectedCell: null,
      direction: 'across',
      currentSlot: null,
      checked: false
    };

    // Reset timer
    if (timerInterval) clearInterval(timerInterval);
    seconds = 0;
    document.getElementById('timer').textContent = '0:00';
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }, 1000);

    renderGame();
    document.getElementById('gameArea').classList.add('active');
    document.getElementById('controls').classList.add('active');
  }, 50);
}

// ===== UI RENDERER =====
const CELL_SIZE = 36;

function renderGame() {
  if (!gameState) return;
  const { grid, numbers, solution, slots } = gameState;

  const container = document.getElementById('gridContainer');
  container.innerHTML = '';
  container.style.width = SIZE * CELL_SIZE + 'px';
  container.style.height = SIZE * CELL_SIZE + 'px';

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (grid[r][c] ? ' black' : '');
      cell.style.width = CELL_SIZE + 'px';
      cell.style.height = CELL_SIZE + 'px';
      cell.style.left = c * CELL_SIZE + 'px';
      cell.style.top = r * CELL_SIZE + 'px';
      cell.dataset.row = r;
      cell.dataset.col = c;

      if (!grid[r][c]) {
        if (numbers[r][c]) {
          const numSpan = document.createElement('span');
          numSpan.className = 'number';
          numSpan.textContent = numbers[r][c];
          cell.appendChild(numSpan);
        }
        const letterSpan = document.createElement('span');
        letterSpan.className = 'letter';
        cell.appendChild(letterSpan);
        cell.addEventListener('click', () => selectCell(r, c));
      }
      container.appendChild(cell);
    }
  }

  renderClues();
  updateDisplay();
}

function renderClues() {
  const { slots } = gameState;
  const acrossDiv = document.getElementById('acrossClues');
  const downDiv = document.getElementById('downClues');
  acrossDiv.innerHTML = '';
  downDiv.innerHTML = '';

  const acrossSlots = slots.filter(s => s.dir === 'across').sort((a, b) => a.number - b.number);
  const downSlots = slots.filter(s => s.dir === 'down').sort((a, b) => a.number - b.number);

  for (const slot of acrossSlots) {
    const word = gameState.solution[slot.row][slot.col] ?
      slot.cells.map(([r, c]) => gameState.solution[r][c]).join('') : '';
    const clue = wordClueMap[word] || 'Clue unavailable';
    const div = document.createElement('div');
    div.className = 'clue';
    div.dataset.slotDir = 'across';
    div.dataset.slotNum = slot.number;
    div.innerHTML = `<span class="clue-num">${slot.number}.</span> ${clue}`;
    div.addEventListener('click', () => selectSlot(slot));
    acrossDiv.appendChild(div);
  }

  for (const slot of downSlots) {
    const word = slot.cells.map(([r, c]) => gameState.solution[r][c]).join('');
    const clue = wordClueMap[word] || 'Clue unavailable';
    const div = document.createElement('div');
    div.className = 'clue';
    div.dataset.slotDir = 'down';
    div.dataset.slotNum = slot.number;
    div.innerHTML = `<span class="clue-num">${slot.number}.</span> ${clue}`;
    div.addEventListener('click', () => selectSlot(slot));
    downDiv.appendChild(div);
  }
}

function findSlotForCell(r, c, dir) {
  return gameState.slots.find(s =>
    s.dir === dir && s.cells.some(([cr, cc]) => cr === r && cc === c)
  );
}

function selectCell(r, c) {
  if (gameState.grid[r][c]) return;

  if (gameState.selectedCell && gameState.selectedCell[0] === r && gameState.selectedCell[1] === c) {
    // Toggle direction
    const newDir = gameState.direction === 'across' ? 'down' : 'across';
    const slot = findSlotForCell(r, c, newDir);
    if (slot) gameState.direction = newDir;
  }

  gameState.selectedCell = [r, c];
  gameState.currentSlot = findSlotForCell(r, c, gameState.direction);
  if (!gameState.currentSlot) {
    gameState.direction = gameState.direction === 'across' ? 'down' : 'across';
    gameState.currentSlot = findSlotForCell(r, c, gameState.direction);
  }
  gameState.checked = false;
  updateDisplay();
}

function selectSlot(slot) {
  gameState.direction = slot.dir;
  gameState.selectedCell = [slot.row, slot.col];
  gameState.currentSlot = slot;
  gameState.checked = false;
  updateDisplay();
}

function updateDisplay() {
  if (!gameState) return;
  const { grid, userLetters, selectedCell, currentSlot } = gameState;

  const cells = document.querySelectorAll('.cell:not(.black)');
  cells.forEach(cell => {
    const r = +cell.dataset.row, c = +cell.dataset.col;
    cell.classList.remove('selected', 'highlighted', 'correct', 'incorrect');
    const letterSpan = cell.querySelector('.letter');
    if (letterSpan) letterSpan.textContent = userLetters[r][c];
  });

  // Highlight current slot
  if (currentSlot) {
    for (const [r, c] of currentSlot.cells) {
      const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
      if (cell) cell.classList.add('highlighted');
    }
  }

  // Highlight selected cell
  if (selectedCell) {
    const cell = document.querySelector(`.cell[data-row="${selectedCell[0]}"][data-col="${selectedCell[1]}"]`);
    if (cell) cell.classList.add('selected');
  }

  // Highlight active clue
  document.querySelectorAll('.clue').forEach(el => el.classList.remove('active'));
  if (currentSlot) {
    const clueEl = document.querySelector(`.clue[data-slot-dir="${currentSlot.dir}"][data-slot-num="${currentSlot.number}"]`);
    if (clueEl) {
      clueEl.classList.add('active');
      clueEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
}

function moveToNextCell() {
  if (!gameState.selectedCell || !gameState.currentSlot) return;
  const [r, c] = gameState.selectedCell;
  const slot = gameState.currentSlot;
  const idx = slot.cells.findIndex(([cr, cc]) => cr === r && cc === c);
  if (idx < slot.cells.length - 1) {
    gameState.selectedCell = slot.cells[idx + 1];
  }
}

function moveToPrevCell() {
  if (!gameState.selectedCell || !gameState.currentSlot) return;
  const [r, c] = gameState.selectedCell;
  const slot = gameState.currentSlot;
  const idx = slot.cells.findIndex(([cr, cc]) => cr === r && cc === c);
  if (idx > 0) {
    gameState.selectedCell = slot.cells[idx - 1];
  }
}

function moveToNextSlot() {
  if (!gameState.currentSlot) return;
  const dir = gameState.direction;
  const slotsOfDir = gameState.slots.filter(s => s.dir === dir).sort((a, b) => a.number - b.number);
  const idx = slotsOfDir.indexOf(gameState.currentSlot);
  let nextIdx = (idx + 1) % slotsOfDir.length;
  // If wrapping, switch direction
  if (nextIdx === 0) {
    gameState.direction = dir === 'across' ? 'down' : 'across';
    const newSlots = gameState.slots.filter(s => s.dir === gameState.direction).sort((a, b) => a.number - b.number);
    gameState.currentSlot = newSlots[0];
  } else {
    gameState.currentSlot = slotsOfDir[nextIdx];
  }
  if (gameState.currentSlot) {
    gameState.selectedCell = [gameState.currentSlot.row, gameState.currentSlot.col];
  }
}

function handleKeydown(e) {
  if (!gameState || !gameState.selectedCell) return;
  const [r, c] = gameState.selectedCell;

  if (e.key === 'Tab') {
    e.preventDefault();
    moveToNextSlot();
    updateDisplay();
    return;
  }

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (c < SIZE - 1 && !gameState.grid[r][c + 1]) {
      gameState.selectedCell = [r, c + 1];
      gameState.direction = 'across';
      gameState.currentSlot = findSlotForCell(r, c + 1, 'across') || gameState.currentSlot;
    }
    updateDisplay();
    return;
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (c > 0 && !gameState.grid[r][c - 1]) {
      gameState.selectedCell = [r, c - 1];
      gameState.direction = 'across';
      gameState.currentSlot = findSlotForCell(r, c - 1, 'across') || gameState.currentSlot;
    }
    updateDisplay();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (r < SIZE - 1 && !gameState.grid[r + 1][c]) {
      gameState.selectedCell = [r + 1, c];
      gameState.direction = 'down';
      gameState.currentSlot = findSlotForCell(r + 1, c, 'down') || gameState.currentSlot;
    }
    updateDisplay();
    return;
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (r > 0 && !gameState.grid[r - 1][c]) {
      gameState.selectedCell = [r - 1, c];
      gameState.direction = 'down';
      gameState.currentSlot = findSlotForCell(r - 1, c, 'down') || gameState.currentSlot;
    }
    updateDisplay();
    return;
  }

  if (e.key === 'Backspace' || e.key === 'Delete') {
    e.preventDefault();
    if (gameState.userLetters[r][c]) {
      gameState.userLetters[r][c] = '';
    } else {
      moveToPrevCell();
      const [nr, nc] = gameState.selectedCell;
      gameState.userLetters[nr][nc] = '';
    }
    updateDisplay();
    return;
  }

  if (/^[a-zA-Z]$/.test(e.key)) {
    e.preventDefault();
    gameState.userLetters[r][c] = e.key.toUpperCase();
    moveToNextCell();
    updateDisplay();
    checkCompletion();
    return;
  }
}

function checkCompletion() {
  if (!gameState) return;
  const { grid, solution, userLetters } = gameState;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c] && userLetters[r][c] !== solution[r][c]) return;
    }
  }
  // Puzzle complete!
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('message').textContent =
    `Congratulations! Puzzle completed in ${document.getElementById('timer').textContent}!`;
}

function checkAnswers() {
  if (!gameState) return;
  const { grid, solution, userLetters } = gameState;
  const cells = document.querySelectorAll('.cell:not(.black)');
  cells.forEach(cell => {
    const r = +cell.dataset.row, c = +cell.dataset.col;
    cell.classList.remove('correct', 'incorrect');
    if (userLetters[r][c]) {
      if (userLetters[r][c] === solution[r][c]) {
        cell.classList.add('correct');
      } else {
        cell.classList.add('incorrect');
      }
    }
  });
}

function revealAll() {
  if (!gameState) return;
  const { grid, solution, userLetters } = gameState;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (!grid[r][c]) userLetters[r][c] = solution[r][c];
    }
  }
  if (timerInterval) clearInterval(timerInterval);
  updateDisplay();
  document.getElementById('message').textContent = 'Puzzle revealed.';
}

function clearGrid() {
  if (!gameState) return;
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      gameState.userLetters[r][c] = '';
  const cells = document.querySelectorAll('.cell:not(.black)');
  cells.forEach(cell => cell.classList.remove('correct', 'incorrect'));
  document.getElementById('message').textContent = '';
  updateDisplay();
}

// ===== INITIALIZATION =====
document.getElementById('buildBtn').addEventListener('click', buildGame);
document.getElementById('checkBtn').addEventListener('click', checkAnswers);
document.getElementById('revealBtn').addEventListener('click', revealAll);
document.getElementById('clearBtn').addEventListener('click', clearGrid);
document.addEventListener('keydown', handleKeydown);
</script>
